timeout: 5
#default_entry: 2
remember_last_entry: yes

# custom limine theme
term_palette: 1e1e2e;f38ba8;a6e3a1;f9e2af;89b4fa;f5c2e7;94e2d5;cdd6f4
term_palette_bright: 585b70;f38ba8;a6e3a1;f9e2af;89b4fa;f5c2e7;94e2d5;cdd6f4
term_background: ffffffff
term_foreground: cdd6f4
term_background_bright: ffffffff
term_foreground_bright: cdd6f4
#interface_branding:
wallpaper: boot():/gentoo-splash.jpg

#comment: machine-id=
/Linux
//gentoo
  protocol: linux
  #comment: Kernel version: <version>-gentoo
  #comment: kernel-id=gentoo
  path: boot():/vmlinuz
  cmdline: root=UUID=xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx rw quiet splash
